<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Message</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, sans-serif;
      background: #f2f2f2;
    }

    .message {
      width: fit-content;
      text-align: left;
      line-height: 1.7;
    }

    .author {
      text-align: right;
      font-weight: 500;
      white-space: pre;  /* ← ここがポイント */
    }
  </style>
</head>

<body>
  <div class="message">
    お世話になっております。<br>
    参照したいURLが3行を超えていますので、添付資料に詳細を記入しています。<br>
    よろしくお願いします。<br>
    <div class="author">@tomoki　</div> <!-- ← 本物の全角スペース1文字 -->
  </div>
</body>
</html>
